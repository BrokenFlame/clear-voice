# ── ClearVoice Production Values Override ──────────────────────────────────────
# Use with: helm install clearvoice ./helm/clearvoice -f values-prod.yaml
#
# This file overrides values.yaml with production-specific settings

global:
  environment: production
  imageRegistry: 123456789012.dkr.ecr.eu-west-2.amazonaws.com

# ── External Secrets (production) ───────────────────────────────────────────
# Requires External Secrets Operator installed in the cluster and a
# ClusterSecretStore named aws-secretsmanager.
externalSecrets:
  enabled: true
  targetSecretName: clearvoice-secrets
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  data:
    - secretKey: postgres-connection-string
      remoteRef:
        key: /clearvoice/prod/postgres
        property: connectionString
    - secretKey: keycloak-authority
      remoteRef:
        key: /clearvoice/prod/keycloak
        property: authority
    - secretKey: keycloak-client-id
      remoteRef:
        key: /clearvoice/prod/keycloak
        property: clientId
    - secretKey: keycloak-audience
      remoteRef:
        key: /clearvoice/prod/keycloak
        property: audience
    - secretKey: s3-bucket-name
      remoteRef:
        key: /clearvoice/prod/s3
        property: bucketName
    - secretKey: s3-region
      remoteRef:
        key: /clearvoice/prod/s3
        property: region

# ── API Deployment ────────────────────────────────────────────────────────────
api:
  replicaCount: 3
  
  resources:
    requests:
      cpu: 750m
      memory: 768Mi
    limits:
      cpu: 1500m
      memory: 1536Mi
  
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
  
  env:
    ASPNETCORE_ENVIRONMENT: Production
    Keycloak__RequireHttpsMetadata: "true"
    Storage__Provider: S3
    Storage__S3__UseIRSA: "true"
    Logging__LogLevel__Default: Information
    Logging__LogLevel__Microsoft: Warning

# ── UI Deployment ─────────────────────────────────────────────────────────────
ui:
  replicaCount: 3
  
  resources:
    requests:
      cpu: 150m
      memory: 192Mi
    limits:
      cpu: 300m
      memory: 384Mi
  
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ── PostgreSQL (AWS RDS) ──────────────────────────────────────────────────────
postgres:
  enabled: false  # Use managed RDS
  
  host: clearvoice-prod.c9akciq32.eu-west-2.rds.amazonaws.com
  port: 5432
  database: clearvoice_prod
  username: postgres

# ── S3 Storage ────────────────────────────────────────────────────────────────
s3:
  enabled: true
  bucketName: clearvoice-prod-audio
  region: eu-west-2
  useIRSA: true
  iamRoleArn: "arn:aws:iam::123456789012:role/clearvoice-api-s3-role"

# ── Ingress — Istio ingress-gateway with TLS offloading ──────────────────────
# Istio ingress-gateway terminates TLS; pods receive plain HTTP.
# cert-manager provisions the certificate and stores it in clearvoice-tls.
# The secret must be in the same namespace as the Ingress resource OR in the
# istio-system namespace if using Istio's credentialName secret projection.
ingress:
  enabled: true
  className: istio

  annotations:
    # cert-manager provisions and rotates the TLS certificate automatically.
    cert-manager.io/cluster-issuer: letsencrypt-prod

  hosts:
    - host: clearvoice.example.com
      paths:
        - path: /api
          pathType: Prefix
          backend: api
        - path: /
          pathType: Prefix
          backend: ui

  # Istio reads spec.tls to configure TLS on the ingress gateway.
  # Remove this block if you manage TLS via a Gateway CRD instead.
  tls:
    - secretName: clearvoice-tls
      hosts:
        - clearvoice.example.com

# ── Pod Disruption Budget ─────────────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ── Monitoring ────────────────────────────────────────────────────────────────
monitoring:
  cloudwatch:
    enabled: true
    namespace: /aws/eks/clearvoice-prod
    logRetentionDays: 30
  
  prometheus:
    enabled: true
    scrape_interval: 30s
  
  logging:
    driver: awslogs
    options:
      awslogs-group: /aws/eks/clearvoice/prod
      awslogs-region: eu-west-2
      awslogs-stream-prefix: pod

# ── Security ──────────────────────────────────────────────────────────────────
security:
  podSecurityPolicy: restricted

  rbac:
    create: true

  networkPolicy:
    enabled: true

  # CORS — origins the API will accept requests from.
  # Replace with your actual production hostname(s).
  cors:
    allowedOrigins:
      - https://clearvoice.example.com

  # CSP — adjust connect-src to match your API and Keycloak hostnames.
  csp:
    policy: >-
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data:;
      connect-src 'self' https://api.clearvoice.example.com https://keycloak.example.com;
      frame-ancestors 'none';

  secrets:
    encryption: true
    kmsKeyId: "arn:aws:kms:eu-west-2:123456789012:key/12345678-1234-1234-1234-123456789012"

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

  podSecurityContext:
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

# ── Backup & DR ───────────────────────────────────────────────────────────────
backup:
  rds:
    backupRetentionPeriod: 30
    multiAZ: true
    storageEncryption: true
    kmsKeyId: "arn:aws:kms:eu-west-2:123456789012:key/12345678-1234-1234-1234-123456789012"
  
  s3:
    versioning: true
    lifecycle:
      - id: archive-old-files
        filter:
          prefix: audio/
        transitions:
          - daysAfterInitiation: 90
            storageClass: GLACIER
      - id: delete-old-versions
        filter:
          prefix: audio/
        noncurrentVersionExpiration:
          noncurrentDays: 365
  
  crossRegionReplication:
    enabled: true
    destinationRegion: eu-west-1
