apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clearvoice.fullname" . }}-nginx-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "clearvoice.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Disable nginx version in headers
        server_tokens off;

        # Security headers
        add_header X-Frame-Options           "DENY"            always;
        add_header X-Content-Type-Options    "nosniff"         always;
        add_header Referrer-Policy           "no-referrer"     always;
        add_header Permissions-Policy        "geolocation=()"  always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy   {{ .Values.security.csp.policy | quote }} always;

        # Static assets — long cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Health check for load balancer / K8s probe
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Runtime environment config generated at container startup
        location = /env.js {
            alias /tmp/env.js;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # SPA fallback — all routes served by index.html
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Gzip
        gzip            on;
        gzip_types      text/plain text/css application/javascript application/json
                        application/xml image/svg+xml;
        gzip_min_length 1024;
    }
