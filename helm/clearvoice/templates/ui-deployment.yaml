{{- $ui := .Values.ui }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clearvoice.fullname" . }}-ui
  labels:
    {{- include "clearvoice.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ $ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "clearvoice.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "clearvoice.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/ui-nginx-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "clearvoice.fullname" . }}-ui
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: ui
          image: "{{ .Values.global.imageRegistry }}/{{ $ui.image.repository }}:{{ $ui.image.tag }}"
          imagePullPolicy: {{ $ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            {{- toYaml $ui.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml $ui.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml $ui.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-log
              mountPath: /var/log/nginx
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "clearvoice.fullname" . }}-nginx-config
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-log
          emptyDir: {}
        - name: tmp
          emptyDir: {}
