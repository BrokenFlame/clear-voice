apiVersion: v1
kind: Service
metadata:
  name: {{ include "clearvoice.fullname" . }}-api
  labels:
    {{- include "clearvoice.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "clearvoice.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clearvoice.fullname" . }}-ui
  labels:
    {{- include "clearvoice.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: {{ .Values.ui.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "clearvoice.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
