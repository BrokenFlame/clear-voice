{{- if not .Values.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clearvoice.fullname" . }}-secrets
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "clearvoice.labels" . | nindent 4 }}
type: Opaque
data:
  # PostgreSQL connection string (base64 encoded)
  # Format: Host=<RDS_ENDPOINT>;Port=5432;Database=<DB_NAME>;Username=<USER>;Password=<PASS>
  postgres-connection-string: {{ .Values.postgres | toJson | b64enc }}
  
  # Keycloak OIDC configuration (Keycloak is an external service; set real values here)
  keycloak-authority: {{ "" | default "https://keycloak.example.com/realms/clearvoice" | b64enc }}
  keycloak-client-id: {{ "" | default "clearvoice-api" | b64enc }}
  keycloak-audience: {{ "" | default "clearvoice-api" | b64enc }}
  
  # S3 configuration
  s3-bucket-name: {{ .Values.s3.bucketName | b64enc }}
  s3-region: {{ .Values.s3.region | b64enc }}
  
  # Optional: S3 access keys (if not using IRSA)
  {{- if .Values.s3.accessKeyId }}
  s3-access-key-id: {{ .Values.s3.accessKeyId | b64enc }}
  {{- end }}
  {{- if .Values.s3.secretAccessKey }}
  s3-secret-access-key: {{ .Values.s3.secretAccessKey | b64enc }}
  {{- end }}
  
  # Encryption key for sensitive data
  {{- if .Values.encryption }}
  encryption-key: {{ .Values.encryption.key | b64enc }}
  {{- end }}
---
# Additional secret for RDS credentials (created separately in production)
{{- if and .Values.postgres .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clearvoice.fullname" . }}-rds-credentials
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "clearvoice.labels" . | nindent 4 }}
type: Opaque
data:
  username: {{ .Values.postgres.username | b64enc }}
  password: {{ .Values.postgres.password | b64enc }}
{{- end }}
{{- end }}
