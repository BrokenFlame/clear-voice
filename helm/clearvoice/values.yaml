# ── ClearVoice Helm values ────────────────────────────────────────────────────
# Override with: helm upgrade --install clearvoice ./helm/clearvoice -f my-values.yaml

global:
  imageRegistry: ""   # e.g. 123456789012.dkr.ecr.eu-west-2.amazonaws.com

# ── API ───────────────────────────────────────────────────────────────────────
api:
  image:
    repository: clearvoice/api
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  replicaCount: 2

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # IRSA — set to the IAM Role ARN that grants s3:GetObject / s3:PutObject / s3:DeleteObject
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/clearvoice-api-s3-role"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

  env:
    ASPNETCORE_ENVIRONMENT: Production
    Keycloak__RequireHttpsMetadata: "true"
    Storage__Provider: S3
    Storage__S3__UseIRSA: "true"

  # These come from Kubernetes Secrets — do not put real values here
  secretEnv:
    - name: ConnectionStrings__Postgres
      secretName: clearvoice-secrets
      secretKey: postgres-connection-string
    - name: Keycloak__Authority
      secretName: clearvoice-secrets
      secretKey: keycloak-authority
    - name: Keycloak__Audience
      secretName: clearvoice-secrets
      secretKey: keycloak-audience
    - name: Storage__S3__BucketName
      secretName: clearvoice-secrets
      secretKey: s3-bucket-name
    - name: Storage__S3__Region
      secretName: clearvoice-secrets
      secretKey: s3-region

  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 20

  readinessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10

# ── UI ────────────────────────────────────────────────────────────────────────
ui:
  image:
    repository: clearvoice/ui
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  replicaCount: 2

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  serviceAccount:
    create: true
    annotations: {}   # no IRSA needed for the static UI

  livenessProbe:
    httpGet:
      path: /nginx-health
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 15

  readinessProbe:
    httpGet:
      path: /nginx-health
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: alb         # AWS Load Balancer Controller
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:eu-west-2:ACCOUNT_ID:certificate/CERT_ID"
    alb.ingress.kubernetes.io/ssl-redirect: "443"
  hosts:
    - host: clearvoice.example.com
      paths:
        - path: /api
          pathType: Prefix
          backend: api
        - path: /
          pathType: Prefix
          backend: ui

# ── PostgreSQL (sub-chart placeholder) ────────────────────────────────────────
# In production use an RDS instance; connection string goes in clearvoice-secrets.
# Set postgresql.enabled: true only for dev/staging cluster installs.
postgresql:
  enabled: false

# ── Pod disruption budget ─────────────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1
